<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 64 64\" fill=\"none\">\n  <!-- Background circle: deep navy -->\n  <circle cx=\"32\" cy=\"32\" r=\"30\" fill=\"#0f0d0a\" stroke=\"#c9a84c\" stroke-width=\"2\"/>\n  <!-- Inner decorative ring -->\n  <circle cx=\"32\" cy=\"32\" r=\"24\" fill=\"none\" stroke=\"#c9a84c\" stroke-width=\"0.8\" opacity=\"0.4\"/>\n  <!-- 紫微 character (stylized) -->\n  <text x=\"32\" y=\"38\" font-family=\"serif\" font-size=\"22\" font-weight=\"700\" \n        fill=\"#c9a84c\" text-anchor=\"middle\" dominant-baseline=\"middle\">紫</text>\n  <!-- Small decorative dots at compass points -->\n  <circle cx=\"32\" cy=\"8\" r=\"2\" fill=\"#c9a84c\" opacity=\"0.7\"/>\n  <circle cx=\"32\" cy=\"56\" r=\"2\" fill=\"#c9a84c\" opacity=\"0.7\"/>\n  <circle cx=\"8\" cy=\"32\" r=\"2\" fill=\"#c9a84c\" opacity=\"0.7\"/>\n  <circle cx=\"56\" cy=\"32\" r=\"2\" fill=\"#c9a84c\" opacity=\"0.7\"/>\n  <!-- Diagonal corner accents -->\n  <circle cx=\"14\" cy=\"14\" r=\"1.5\" fill=\"#c9a84c\" opacity=\"0.4\"/>\n  <circle cx=\"50\" cy=\"14\" r=\"1.5\" fill=\"#c9a84c\" opacity=\"0.4\"/>\n  <circle cx=\"14\" cy=\"50\" r=\"1.5\" fill=\"#c9a84c\" opacity=\"0.4\"/>\n  <circle cx=\"50\" cy=\"50\" r=\"1.5\" fill=\"#c9a84c\" opacity=\"0.4\"/>\n</svg>\n