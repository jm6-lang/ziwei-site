<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 40\" fill=\"none\">\n  <!-- Logo mark: small imperial circle -->\n  <circle cx=\"20\" cy=\"20\" r=\"16\" fill=\"#0f0d0a\" stroke=\"#c9a84c\" stroke-width=\"1.5\"/>\n  <circle cx=\"20\" cy=\"20\" r=\"12\" fill=\"none\" stroke=\"#c9a84c\" stroke-width=\"0.8\" opacity=\"0.4\"/>\n  <text x=\"20\" y=\"26\" font-family=\"serif\" font-size=\"14\" font-weight=\"700\" fill=\"#c9a84c\" text-anchor=\"middle\" dominant-baseline=\"middle\">紫</text>\n  <!-- Divider line -->\n  <line x1=\"42\" y1=\"10\" x2=\"42\" y2=\"30\" stroke=\"#c9a84c\" stroke-width=\"1\" opacity=\"0.4\"/>\n  <!-- Text: Zi Wei -->\n  <text x=\"52\" y=\"18\" font-family=\"'Noto Serif SC', serif\" font-size=\"11\" font-weight=\"600\" fill=\"#c9a84c\" letter-spacing=\"1\">紫微斗数</text>\n  <text x=\"52\" y=\"30\" font-family=\"Georgia, serif\" font-size=\"8\" fill=\"#7a6a50\" letter-spacing=\"1\">Zi Wei Dou Shu</text>\n</svg>\n